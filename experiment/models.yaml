# ============================================================
# 实验配置 / Experiment config
# 只改这个文件即可增删模型、切换语言与采样方式。
# ============================================================

# 题库路径(相对本文件所在目录的上一级,即 EAI Project/)
item_bank: "../题库_ItemBank_v2_400.xlsx"
sheet: "ItemBank 题库"          # 工作表名;留空则取第一个表

languages: ["en"]               # 只跑英文(如需中文,改回 ["zh","en"] 即可,已跑的英文不会重跑)
n_samples: 4                    # 每题采样次数(temperature>0 多次采样)
concurrency: 8                  # 并发请求数;本地模型设成 ≤ LM Studio 的 Max Concurrent Predictions(你现在是4)
max_tokens: 1024                # 允许思考型模型先输出思维链再给 JSON;留足额度防截断
                                # (若仍出现 finish_reason=length,继续调大到 2048)
json_mode: false                # 若本地端点支持结构化输出可设 true(强制合法 JSON、消除代码围栏)
capture_logprobs: false         # 辅助分析:仅对 supports_logprobs 的模型收集 token 概率
use_seed: true                  # 采样时给每次不同 seed(支持的 API 更可复现)
base_seed: 1000
retries: 3
sleep: 0.0                      # 每次调用后停顿秒数(API 限流时调大,如 0.5)

output_dir: "results"
output_file: "results_local.csv"  # 三个本地模型统一写这里(已合并 e2b/e4b/26b 历史数据);用 model 列区分

# ------------------------------------------------------------
# 模型列表。每项字段:
#   name           结果里用的标识(唯一)
#   base_url       OpenAI 兼容端点
#   api_key_env    读取密钥的环境变量名(本地模型可省略)
#   model_id       该端点下的模型标识
#   temperature    采样温度(>0 才有随机性)
#   n_samples      可覆盖全局;确定性单次则设 temperature:0 且 n_samples:1
#   supports_logprobs  该模型是否返回 logprobs(用于辅助分析)
#   max_tokens / timeout / sleep  可选
# 提示:各家 API 的 base_url 见 README_LMStudio.md 第 4 节。
# ------------------------------------------------------------
models:

  # ---- 本地 Gemma 4(LM Studio,全 MLX)----
  # ⚠️ 一次只跑一个:LM Studio 里加载哪个,就 --models 跑对应的那个 name。
  #    别一次跑多个本地 name,否则没加载的那个会被当前加载的模型冒名(看 served_model 列可发现)。
  #    model_id 以 LM Studio 里显示的实际标识为准(Info/Load 标签);因 LM Studio 按已加载模型回答,
  #    这里的 model_id 基本是标签作用,但仍建议填对、并用 served_model 列核对。

  - name: local-gemma-e2b            # 弱端:预期错更多、置信度更散(最有信息量的补充)
    base_url: "http://localhost:1234/v1"
    api_key: "lm-studio"
    model_id: "google/gemma-4-e2b"   # 以 LM Studio 实际标识为准
    temperature: 0.7
    supports_logprobs: true

  - name: local-gemma-e4b            # 中:已完成一轮(数据在 results_gemma4-e4b.csv)
    base_url: "http://localhost:1234/v1"
    api_key: "lm-studio"
    model_id: "google/gemma-4-e4b"
    temperature: 0.7
    supports_logprobs: true

  - name: local-gemma-26b-a4b-qat    # 强端:MoE,26B 全进内存但只激活 4B → 快;QAT 低比特高质量
    base_url: "http://localhost:1234/v1"
    api_key: "lm-studio"
    model_id: "google/gemma-4-26b-a4b-qat"   # 以 LM Studio 实际标识为准
    temperature: 0.7
    supports_logprobs: true

  # ---- 暂不用:无 MLX 版,near-ceiling,先注释 ----
  # - name: local-gemma-12b
  #   base_url: "http://localhost:1234/v1"
  #   api_key: "lm-studio"
  #   model_id: "google/gemma-4-12b"
  #   temperature: 0.7
  #   supports_logprobs: true
  #
  # - name: local-gemma-31b
  #   base_url: "http://localhost:1234/v1"
  #   api_key: "lm-studio"
  #   model_id: "google/gemma-4-31b"
  #   temperature: 0.7
  #   supports_logprobs: true

  # ---- 本地 Qwen3 小模型(LM Studio,MLX,思考型)----
  # 一次加载一个,--models 跑对应 name;model_id 以 LM Studio Info/Load 显示为准,靠 served_model 列核对。
  # Qwen3 会思考 → 看 reasoning_tokens;若 finish_reason=length 多,再调大 max_tokens。
  - name: local-qwen3-1.7b           # 弱端(1.7B)→ 最可能过度自信
    base_url: "http://localhost:1234/v1"
    api_key: "lm-studio"
    model_id: "qwen/qwen3-1.7b"
    temperature: 0.7
    max_tokens: 2048
    supports_logprobs: true

  - name: local-qwen3-4b             # 中小(4B)
    base_url: "http://localhost:1234/v1"
    api_key: "lm-studio"
    model_id: "qwen/qwen3-4b"
    temperature: 0.7
    max_tokens: 2048
    supports_logprobs: true

  - name: local-qwen3-14b            # 中(14B)
    base_url: "http://localhost:1234/v1"
    api_key: "lm-studio"
    model_id: "qwen/qwen3-14b"
    temperature: 0.7
    max_tokens: 2048
    supports_logprobs: true

  # ---- 本地 Qwen3 无思考版(对照;需验证 reasoning_tokens 是否真的降为 0)----
  # extra_body.chat_template_kwargs.enable_thinking=false 未必被 LM Studio 透传;
  # 跑 --limit 5 看 reasoning_tokens:若仍>0,改用 LM Studio 模型设置里的 Reasoning 开关关掉。
  - name: local-qwen3-1.7b-nothink
    base_url: "http://localhost:1234/v1"
    api_key: "lm-studio"
    model_id: "qwen/qwen3-1.7b"
    temperature: 0.7
    max_tokens: 512
    extra_body: {chat_template_kwargs: {enable_thinking: false}}

  - name: local-qwen3-4b-nothink
    base_url: "http://localhost:1234/v1"
    api_key: "lm-studio"
    model_id: "qwen/qwen3-4b"
    temperature: 0.7
    max_tokens: 512
    extra_body: {chat_template_kwargs: {enable_thinking: false}}

  - name: local-qwen3-14b-nothink
    base_url: "http://localhost:1234/v1"
    api_key: "lm-studio"
    model_id: "qwen/qwen3-14b"
    temperature: 0.7
    max_tokens: 512
    extra_body: {chat_template_kwargs: {enable_thinking: false}}

  # ---- OpenAI ----
  - name: gpt-5.5                    # 前沿旗舰(思考型)
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_id: "gpt-5.5"
    temperature: 0.7
    supports_logprobs: true

  - name: gpt-5.4-mini              # 中/快点,给 OpenAI 内部梯度
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_id: "gpt-5.4-mini"        # 更弱点可用 gpt-5.4-nano
    temperature: 0.7
    supports_logprobs: true

  # ---- OpenAI 老模型(非推理,便宜;弱端更可能产生校准信号)----
  # 已从 ChatGPT 下架但 API 仍可用。若某个 404 → 该账号无权限或已彻底退役,删掉即可。
  # 都是非推理模型 → 用标准 temperature+max_tokens,运行器自动走普通路径。
  - name: gpt-4o-mini               # 2024,最弱之一 → 最可能给出错误/过度自信
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_id: "gpt-4o-mini"
    temperature: 0.7
    supports_logprobs: true

  - name: gpt-4.1-mini
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_id: "gpt-4.1-mini"
    temperature: 0.7
    supports_logprobs: true

  - name: gpt-4o                    # 2024 中端
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_id: "gpt-4o"
    temperature: 0.7
    supports_logprobs: true

  - name: gpt-4.1
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_id: "gpt-4.1"
    temperature: 0.7
    supports_logprobs: true

  - name: deepseek-v4-pro
    base_url: "https://api.deepseek.com"
    api_key_env: "DEEPSEEK_API_KEY"
    model_id: "deepseek-v4-pro"
    temperature: 0.7

  - name: deepseek-v4-flash
    base_url: "https://api.deepseek.com"
    api_key_env: "DEEPSEEK_API_KEY"
    model_id: "deepseek-v4-flash"
    temperature: 0.7

  # ---- DeepSeek 无思考条件(与上面思考版对照;单独 name + 单独 output-file)----
  # V4 用 thinking.type=disabled 关思考;关掉后 temperature 正常生效。跑完看 reasoning_tokens 应≈0。
  - name: deepseek-v4-pro-nothink
    base_url: "https://api.deepseek.com"
    api_key_env: "DEEPSEEK_API_KEY"
    model_id: "deepseek-v4-pro"
    temperature: 0.7
    extra_body: {thinking: {type: disabled}}

  - name: deepseek-v4-flash-nothink
    base_url: "https://api.deepseek.com"
    api_key_env: "DEEPSEEK_API_KEY"
    model_id: "deepseek-v4-flash"
    temperature: 0.7
    extra_body: {thinking: {type: disabled}}

  # ---- 通义千问 Qwen(DashScope OpenAI 兼容)----
  # base_url:中国大陆用 dashscope.aliyuncs.com;海外用 dashscope-intl.aliyuncs.com。
  # 需在 .env 填 QWEN_API_KEY(与所选区域一致)。qwen3.7-max 是推理模型。
  - name: qwen3.7-max               # 前沿旗舰(推理型,1M 上下文)
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen3.7-max"
    temperature: 0.7
    # 思考模式若报"仅支持 stream"错误,取消下面两行注释(开思考+流式):
    # stream: true
    # extra_body: {enable_thinking: true}

  - name: qwen3.7-plus              # 多模态旗舰(本研究只用文本)
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen3.7-plus"
    temperature: 0.7
    # stream: true
    # extra_body: {enable_thinking: true}

  # ---- Qwen 无思考条件(与上面思考版对照;单独 name + 单独 output-file)----
  # 关思考后应为非流式;跑完看 reasoning_tokens 是否≈0 以确认真的关掉了。
  - name: qwen3.7-max-nothink        # = qwen3.7-max,但关闭思考
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen3.7-max"
    temperature: 0.7
    extra_body: {enable_thinking: false}

  - name: qwen3.7-plus-nothink       # = qwen3.7-plus,但关闭思考
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen3.7-plus"
    temperature: 0.7
    extra_body: {enable_thinking: false}

  # ---- 百炼 经典/老模型(便宜的弱端点;qwen2.5 系本就无思考)----
  # 全部无思考运行。若某个 404/未开通 → 去百炼控制台"模型广场"开通,或删掉该行。
  # 小模型越小越弱、越可能犯错并过度自信,是最想要的弱端信号。
  - name: qwen-turbo                 # 经典廉价商用款(qwen3 系,显式关思考)
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen-turbo"
    temperature: 0.7
    extra_body: {enable_thinking: false}

  # 以下 model_id 均已在你工作空间的 models.list() 中确认可用(2026-07)。
  - name: qwen1.5-0.5b               # 2024,0.5B,最弱 → 信号最强
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen1.5-0.5b-chat"
    temperature: 0.7

  - name: qwen1.5-1.8b               # 2024,1.8B
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen1.5-1.8b-chat"
    temperature: 0.7

  - name: qwen1.5-7b                 # 2024,7B
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen1.5-7b-chat"
    temperature: 0.7

  - name: qwen1.5-14b                # 2024,14B(老中端)
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen1.5-14b-chat"
    temperature: 0.7

  - name: qwen2-7b                   # 2024,Qwen2 7B
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen2-7b-instruct"
    temperature: 0.7

  - name: qwen2.5-1.5b               # 2024,Qwen2.5 1.5B
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen2.5-1.5b-instruct"
    temperature: 0.7

  - name: qwen2.5-0.5b               # 2024,Qwen2.5 0.5B(最小)
    base_url: "https://ws-dtu27euclxd74a49.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "QWEN_API_KEY"
    model_id: "qwen2.5-0.5b-instruct"
    temperature: 0.7

